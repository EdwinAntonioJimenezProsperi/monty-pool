services:
  - type: web
    name: monty-pool
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      # Cadena de conexión de Postgres (Neon/Supabase). Los datos son
      # permanentes: NO se borran al redesplegar. Se configura en el panel
      # de Render (Environment) y por eso aquí queda con sync: false.
      - key: DATABASE_URL
        sync: false
